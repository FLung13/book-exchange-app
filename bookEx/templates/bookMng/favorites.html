{% extends "base.html" %}
{% load static %}

{% block content %}
<h1 class="h3 mb-4">My Favorite Books</h1>

{% if books %}
<div class="row g-4">
  {% for b in books %}
  <div class="col-12 col-sm-6 col-lg-4">
  <div class="card card-elevated h-100">
    <a href="{% url 'book_detail' b.id %}">
      <img src="{{ b.picture.url }}" class="card-img-top" alt="{{ b.name }}" style="height:240px; object-fit:cover;">
    </a>
    <div class="card-body d-flex flex-column">
      <h5 class="card-title text-truncate">{{ b.name }}</h5>
      <p class="text-muted mb-2"><strong>${{ b.price }}</strong></p>
      <p class="text-muted small mb-3"><i class="bi bi-person"></i> {{ b.username }}</p>

      <div class="mt-auto d-flex justify-content-between gap-2">
        <button class="btn btn-sm btn-outline-danger" onclick="removeFavorite({{ b.id }}, this)">
        <i class="bi bi-heart-fill"></i> Remove
        </button>
        <button class="btn btn-sm btn-success" onclick="addToCart({{ b.id }}, this)">
          <i class="bi bi-cart-plus"></i> Add to Cart
        </button>
      </div>
    </div>
  </div>
</div>
  {% endfor %}
</div>
{% else %}
  <div class="alert alert-info mt-4">
    You don’t have any favorites yet.
    <a href="{% url 'displaybooks' %}" class="alert-link">Browse books</a>.
  </div>
{% endif %}
<script>
function removeFavorite(bookId, btn) {
  fetch(`/fav/toggle/${bookId}`, {
    method: 'POST',
    headers: {
      'X-Requested-With': 'XMLHttpRequest',
      'X-CSRFToken': '{{ csrf_token }}'
    }
  })
  .then(() => {
    // Remove the card from the page
    btn.closest('.col-12').remove();
  });
}
function addToCart(bookId, btn) {
  fetch(`/cart/add/${bookId}`, {
    method: 'GET'
  })
  .then(() => {
    btn.innerHTML = '<i class="bi bi-check"></i> Added';
    btn.classList.remove('btn-success');
    btn.classList.add('btn-secondary');
    btn.disabled = true;
    setTimeout(() => {
      btn.innerHTML = '<i class="bi bi-cart-plus"></i> Add to Cart';
      btn.classList.remove('btn-secondary');
      btn.classList.add('btn-success');
      btn.disabled = false;
    }, 2000);
  });
}
</script>
{% endblock %}
